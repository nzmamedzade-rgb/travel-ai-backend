services:
  - type: web
    name: travel-ai-backend
    runtime: python
    pythonVersion: 3.11
    plan: free
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: PORT
        value: 8000
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT